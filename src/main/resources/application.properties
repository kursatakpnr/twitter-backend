spring.application.name=twitter-clone

# Active Profile
# Lokalde calismak icin asagidaki satirin yorumunu kaldir:
#spring.profiles.active=local

# Database (PostgreSQL - production)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver

# Database (Lokal PostgreSQL - lokalde kullanmak icin yukaridakileri yorum yap, asagidakileri ac)
#spring.datasource.url=jdbc:postgresql://localhost:5432/twitter_clone
#spring.datasource.username=postgres
#spring.datasource.password=admin

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server
server.port=8080

# CORS
app.cors.allowed-origins=https://twitter-frontend-lovat.vercel.app,http://localhost:3000

# JWT
app.jwt.secret=twitterCloneJwtSecretKeyAtLeastThirtyTwoCharactersLong2026
app.jwt.expiration-ms=86400000